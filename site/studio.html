<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>AI Reverse Engineering — Studio</title>
  <link rel="stylesheet" href="src/studio.css" />
  <script type="importmap">
  {
    "imports": {
      "pixi.js": "https://cdn.jsdelivr.net/npm/pixi.js@8/dist/pixi.min.mjs",
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- the active viewer renders full-bleed here -->
  <div id="stage"></div>

  <!-- shown until the first viewer paints -->
  <div id="titlecard">
    <div class="kicker">Reconstructed from the original binaries</div>
    <h1>AI Reverse Engineering</h1>
    <p>Assets decoded from six retro games — pick a game and level from the menu.</p>
  </div>
  <div id="spinner" class="spinner"></div>

  <!-- top-left: open the control window -->
  <button id="menuBtn" class="fab" aria-label="Menu" title="Menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M4 7h16M4 12h16M4 17h16" />
    </svg>
  </button>

  <!-- bottom-right: fullscreen toggle (icon injected by main.js) -->
  <button id="fsBtn" class="fab" aria-label="Fullscreen" title="Fullscreen"></button>

  <!-- the floating control window -->
  <aside id="panel" class="panel">
    <header class="panel-bar">
      <span class="panel-title">AI Reverse Engineering <span class="dot">·</span> Studio</span>
      <button id="panelClose" class="panel-x" aria-label="Close" title="Close">✕</button>
    </header>
    <div class="panel-body">
      <div class="group-label">Game</div>
      <div id="gameList" class="list"></div>
      <div class="group-label">Level</div>
      <div id="levelList" class="list list-scroll"></div>

      <div id="musicLabel" class="group-label">Music</div>
      <div id="musicList" class="list list-scroll"></div>
      <div id="musicTransport" class="transport">
        <button id="musPrev" class="mus-btn" aria-label="Previous" title="Previous">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 6h2v12H7z"/><path d="M20 6v12l-9-6z"/></svg>
        </button>
        <button id="musPlay" class="mus-btn mus-play" aria-label="Play" title="Play"></button>
        <button id="musNext" class="mus-btn" aria-label="Next" title="Next">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 6h2v12h-2z"/><path d="M4 6v12l9-6z"/></svg>
        </button>
        <button id="musRepeat" class="mus-btn" aria-label="Repeat" title="Repeat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/></svg>
        </button>
        <input id="musSeek" class="mus-seek" type="range" min="0" max="1000" value="0" />
        <span id="musTime" class="mus-time">0:00</span>
      </div>

      <div class="group-label">Display</div>
      <label class="switch">
        <input type="checkbox" id="crtToggle" />
        <span class="track"><span class="knob"></span></span>
        <span class="switch-label">CRT filter</span>
      </label>
      <div id="crtControls" class="crt-controls">
        <div class="ctl"><label>Curvature<span id="v_curvature"></span></label><input type="range" id="c_curvature" min="0" max="10" step="0.1" /></div>
        <div class="ctl"><label>Scanline focus<span id="v_beamFocus"></span></label><input type="range" id="c_beamFocus" min="0.2" max="1.0" step="0.01" /></div>
        <div class="ctl"><label>Mask intensity<span id="v_maskStrength"></span></label><input type="range" id="c_maskStrength" min="0" max="1.0" step="0.01" /></div>
        <div class="ctl"><label>Halation<span id="v_glow"></span></label><input type="range" id="c_glow" min="0" max="1.0" step="0.01" /></div>
        <div class="ctl"><label>Chroma blur<span id="v_iqBlur"></span></label><input type="range" id="c_iqBlur" min="0" max="5.0" step="0.1" /></div>
        <div class="ctl"><label>Signal noise<span id="v_noise"></span></label><input type="range" id="c_noise" min="0" max="0.5" step="0.01" /></div>
        <div class="ctl"><label>Mask type<span id="v_maskType"></span></label><input type="range" id="c_maskType" min="0" max="1" step="1" /></div>
        <button id="crtReset" class="reset-btn">Restore defaults</button>
      </div>
    </div>
  </aside>

  <!-- bottom-left caption -->
  <div id="hud" class="hud"></div>

  <script type="module" src="src/studio/main.js"></script>
</body>
</html>
